<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Eazees Restaurant</title>
    <link rel="stylesheet" href="../client/css/style.css">
    <style>
        .hero-section {
            background: linear-gradient(135deg, rgba(44,62,80,0.9), rgba(52,73,94,0.9)),
                        url('https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=1600') center/cover;
            color: white;
            text-align: center;
            padding: 120px 0 80px;
            margin-top: 70px;
        }
        .hero-section h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: fadeInUp 1s ease;
        }
        .hero-section p {
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto 2rem;
            animation: fadeInUp 1s ease 0.2s both;
        }
        .gallery-section {
            padding: 60px 0;
            background: #f8f9fa;
        }
        .gallery-filters {
            text-align: center;
            margin-bottom: 3rem;
        }
        .filter-btn {
            padding: 10px 20px;
            margin: 5px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .filter-btn:hover,
        .filter-btn.active {
            background: #2c3e50;
            color: white;
            border-color: #2c3e50;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }
        .gallery-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            cursor: pointer;
            background: white;
        }
        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .gallery-item:hover img {
            transform: scale(1.05);
        }
        .gallery-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            color: white;
            padding: 2rem 1rem 1rem;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        .gallery-item:hover .gallery-overlay {
            transform: translateY(0);
        }
        .gallery-overlay h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1.2rem;
        }
        .gallery-overlay p {
            margin: 0;
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 3000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            animation: fadeIn 0.3s ease;
        }
        .modal-content {
            position: relative;
            margin: 5% auto;
            max-width: 90%;
            max-height: 90vh;
        }
        .modal-content img {
            width: 100%;
            height: auto;
            max-height: 90vh;
            object-fit: contain;
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            z-index: 3001;
        }
        .close-modal:hover {
            opacity: 0.7;
        }
        .breadcrumb {
            background: rgba(255,255,255,0.1);
            padding: 1rem 0;
            margin-bottom: 2rem;
        }
        .breadcrumb a {
            color: #ffd700;
            text-decoration: none;
            margin: 0 0.5rem;
        }
        .breadcrumb a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1><a href="../index.html" style="color: white; text-decoration: none;">🍽️ Eazees Restaurant</a></h1>
            </div>
            <nav class="nav">
                <a href="../index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="about.html">About</a>
                <a href="gallery.html" style="color: #ffd700;">Gallery</a>
                <a href="faq.html">FAQ</a>
                <a href="contact.html">Contact</a>
                <a href="cart.html" class="cart-link">🛒 Cart (<span id="cartCount">0</span>)</a>
                <a href="history.html">📋 History</a>
            </nav>
        </div>
    </header>

    <section class="hero-section">
        <div class="container">
            <div class="breadcrumb">
                <a href="../index.html">Home</a> > <span>Gallery</span>
            </div>
            <h1>Our Gallery</h1>
            <p>Explore our delicious dishes and restaurant ambiance</p>
        </div>
    </section>

    <section class="gallery-section">
        <div class="container">
            <div class="gallery-filters">
                <button class="filter-btn active" onclick="filterGallery('all')">All Photos</button>
                <button class="filter-btn" onclick="filterGallery('food')">Food</button>
                <button class="filter-btn" onclick="filterGallery('restaurant')">Restaurant</button>
                <button class="filter-btn" onclick="filterGallery('events')">Events</button>
            </div>

            <div class="gallery-grid" id="galleryGrid">
                <!-- Gallery items will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Image Modal -->
    <div id="imageModal" class="modal">
        <span class="close-modal" onclick="closeImageModal()">&times;</span>
        <div class="modal-content">
            <img id="modalImage" src="" alt="">
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Eazees Restaurant. All rights reserved.</p>
        </div>
    </footer>

    <script src="../client/js/gallery.js"></script>
    <script src="../client/js/common.js"></script>
</body>
</html>
