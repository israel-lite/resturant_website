<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Eazees Restaurant</title>
    <link rel="stylesheet" href="../client/css/style.css">
    <style>
        .hero-section {
            background: linear-gradient(135deg, rgba(44,62,80,0.9), rgba(52,73,94,0.9)),
                        url('https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=1600') center/cover;
            color: white;
            text-align: center;
            padding: 120px 0 80px;
            margin-top: 70px;
        }
        .hero-section h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: fadeInUp 1s ease;
        }
        .hero-section p {
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto 2rem;
            animation: fadeInUp 1s ease 0.2s both;
        }
        .cart-section {
            padding: 60px 0;
            background: #f8f9fa;
            min-height: 60vh;
        }
        .breadcrumb {
            background: rgba(255,255,255,0.1);
            padding: 1rem 0;
            margin-bottom: 2rem;
        }
        .breadcrumb a {
            color: #ffd700;
            text-decoration: none;
            margin: 0 0.5rem;
        }
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        .cart-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .cart-items {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .cart-item {
            display: flex;
            gap: 1.5rem;
            padding: 1.5rem 0;
            border-bottom: 1px solid #eee;
            align-items: center;
        }
        .cart-item:last-child {
            border-bottom: none;
        }
        .cart-item-image {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
        }
        .cart-item-details {
            flex: 1;
        }
        .cart-item-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }
        .cart-item-price {
            color: #e74c3c;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 0.5rem;
        }
        .quantity-btn {
            width: 30px;
            height: 30px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .quantity-btn:hover {
            background: #2c3e50;
            color: white;
            border-color: #2c3e50;
        }
        .quantity-value {
            font-weight: bold;
            min-width: 20px;
            text-align: center;
        }
        .remove-item {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .remove-item:hover {
            background: #c0392b;
        }
        .cart-summary {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            height: fit-content;
            position: sticky;
            top: 100px;
        }
        .cart-summary h3 {
            color: #2c3e50;
            margin-bottom: 1.5rem;
            font-size: 1.3rem;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }
        .summary-row:last-child {
            border-bottom: none;
            margin-bottom: 1.5rem;
        }
        .summary-row.total {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
        }
        .empty-cart {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .empty-cart h3 {
            color: #2c3e50;
            margin-bottom: 1rem;
        }
        .empty-cart p {
            color: #666;
            margin-bottom: 2rem;
        }
        .continue-shopping {
            background: #2c3e50;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .continue-shopping:hover {
            background: #34495e;
            transform: translateY(-2px);
        }
        .checkout-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            width: 100%;
            transition: all 0.3s ease;
        }
        .checkout-btn:hover {
            background: #229954;
            transform: translateY(-2px);
        }
        .checkout-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1><a href="../index.html" style="color: white; text-decoration: none;">🍽️ Eazees Restaurant</a></h1>
            </div>
            <nav class="nav">
                <a href="../index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="about.html">About</a>
                <a href="gallery.html">Gallery</a>
                <a href="faq.html">FAQ</a>
                <a href="contact.html">Contact</a>
                <a href="cart.html" style="color: #ffd700;">🛒 Cart (<span id="cartCount">0</span>)</a>
                <a href="history.html">📋 History</a>
            </nav>
        </div>
    </header>

    <section class="hero-section">
        <div class="container">
            <div class="breadcrumb">
                <a href="../index.html">Home</a> > <span>Shopping Cart</span>
            </div>
            <h1>Shopping Cart</h1>
            <p>Review and manage your order items</p>
        </div>
    </section>

    <section class="cart-section">
        <div class="container">
            <div id="cartContent">
                <!-- Cart content will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Checkout Modal -->
    <div id="checkoutModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCheckoutModal()">&times;</span>
            <div class="modal-header">
                <h2>Complete Your Order</h2>
            </div>
            <div class="modal-body">
                <form id="checkoutForm" onsubmit="processCheckout(event)">
                    <div class="form-group">
                        <label for="checkoutName">Full Name</label>
                        <input type="text" id="checkoutName" required>
                    </div>
                    <div class="form-group">
                        <label for="checkoutPhone">Phone Number</label>
                        <input type="tel" id="checkoutPhone" required>
                    </div>
                    <div class="form-group">
                        <label for="checkoutAddress">Delivery Address</label>
                        <textarea id="checkoutAddress" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="checkoutNotes">Order Notes (Optional)</label>
                        <textarea id="checkoutNotes" rows="2"></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Place Order</button>
                </form>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Eazees Restaurant. All rights reserved.</p>
        </div>
    </footer>

    <script src="../client/js/cart.js"></script>
    <script src="../client/js/common.js"></script>
</body>
</html>
